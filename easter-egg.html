<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>숨겨진 이야기</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 28px;
        background:
          radial-gradient(circle at 12% 14%, rgba(245, 233, 212, 0.95), transparent 34%),
          radial-gradient(circle at 72% 8%, rgba(83, 58, 253, 0.22), transparent 30%),
          linear-gradient(180deg, #f7fbff, #ffffff);
        color: #101833;
      }

      main {
        width: min(920px, 100%);
        padding: clamp(28px, 7vw, 56px);
        border: 1px solid rgba(227, 232, 238, 0.9);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 18px 46px rgba(0, 55, 112, 0.12);
        text-align: center;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        margin: 0 auto 28px;
        border-radius: 10px;
        box-shadow: 0 12px 28px rgba(16, 24, 51, 0.16);
      }

      p {
        margin: 0;
        font-size: clamp(24px, 5vw, 42px);
        line-height: 1.35;
        font-weight: 700;
        word-break: keep-all;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="assets/easter-egg-photo.png" alt="이스터 에그 사진">
      <p>이거 사실 유성욱 선생님이 다 만듬. 자료조사부터 홈페이지 제작 모-두 다.</p>
    </main>
  </body>
</html>
